name: CVC5 Verification Pipeline

on:
  push:
    branches: [ "example/alire_HeisenbergCarabiner_to_Dhall" ]
  pull_request:

jobs:
  verify-spark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Provision CVC5 theorem prover
        run: |
          # Provision the CVC5 binary into the CI runner environment
          sudo apt-get update
          sudo apt-get install -y cvc5

      - name: Initialize Alire toolchain
        uses: alire-project/setup-alire@v3

      - name: Execute SPARK verification via CVC5
        run: |
          # If the target directory lacks an alire.toml manifest, generate a
          # transient manifest to satisfy the workspace requirements of 'alr exec'.
          if [ ! -f "alire.toml" ]; then
            alr init --lib transient_workspace
            mv transient_workspace/alire.toml .
            rm -rf transient_workspace
          fi
          
          # Execute GNATprove with CVC5 and retain verification condition artifacts
          alr exec -- gnatprove -P project.gpr --prover=cvc5 --keep-failures
        # Uncomment and configure the following line if project.gpr resides in a subdirectory:
        # working-directory: ./modules/ada-bridge

      - name: Aggregate SMT2 artifacts
        if: always()
        run: |
          # Consolidate CVC5 verification conditions generated by GNATprove
          STAGING_DIR="${{ github.workspace }}/ci-out/smt2-artifacts/ada-cvc5"
          mkdir -p "$STAGING_DIR"

          # Harvest .smt2 artifacts if the output directory was successfully instantiated
          if [ -d "obj/gnatprove" ]; then
            find obj/gnatprove -name "*.smt2" -exec cp {} "$STAGING_DIR/" \;
          fi
        # If using a subdirectory, ensure the harvest path matches:
        # working-directory: ./modules/ada-bridge

      - name: Persist verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smt2-verification-artifacts
          path: ci-out/smt2-artifacts/
          retention-days: 7