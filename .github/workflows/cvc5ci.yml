name: CVC5 & Yices Verification Pipeline

on:
  push:
    branches: [ "feature/HeisenbergCarabiner_to_Dhall" ]
  pull_request:

jobs:
  verify-smt:
    runs-on: ubuntu-latest
    env:
      # TODO: Align this key with the actual string value of ArtifactDirEnv in Scala.
      YICES_ARTIFACT_DIR: ${{ github.workspace }}/ci-out/smt2-artifacts/scala-yices
      SmokeEnv: "1"
      Z3_LIB_PATH: /usr/lib/x86_64-linux-gnu/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Provision theorem provers
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sri-csl/formal-methods
          sudo apt-get install -y cvc5 yices2 z3
          ln -s /usr/bin/yices-smt2 /usr/local/bin/yices-smt2

      - name: Initialize Alire environment
        uses: alire-project/setup-alire@v3

      - name: Initialize Scala toolchain
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Execute SPARK verification via CVC5
        run: |
          # Emit verification conditions to obj/gnatprove/
          alr exec -- gnatprove -P project.gpr --prover=cvc5 --keep-failures

      - name: Execute Yices verification smoke tests
        run: |
          # Emit SMT-LIB2 artifacts to the path specified by YICES_ARTIFACT_DIR
          sbt "project yicesBridge" test

      - name: Aggregate SMT2 artifacts
        if: always()
        run: |
          STAGING_DIR="${{ github.workspace }}/ci-out/smt2-artifacts"
          mkdir -p "$STAGING_DIR/ada-cvc5"

          # Harvest CVC5 verification conditions generated by GNATprove.
          if [ -d "obj/gnatprove" ]; then
            find obj/gnatprove -name "*.smt2" -exec cp {} "$STAGING_DIR/ada-cvc5/" \;
          fi

      - name: Persist verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smt2-verification-artifacts
          path: ci-out/smt2-artifacts/
          retention-days: 7