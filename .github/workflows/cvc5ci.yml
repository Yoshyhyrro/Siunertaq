name: CVC5 Verification Pipeline

on:
  push:
    branches: [ "example/alire_HeisenbergCarabiner_to_Dhall" ]
  pull_request:

jobs:
  verify-spark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Provision CVC5 theorem prover
        run: |
          sudo apt-get update
          sudo apt-get install -y cvc5

      - name: Initialize Alire toolchain
        uses: alire-project/setup-alire@v3

      - name: Bootstrap Ada Source Directory
        run: |
          # Scaffold the physical source tree required by the GNAT project manager
          mkdir -p src
          
          # Synthesize a baseline SPARK specification with contract-based assertions
          cat << 'EOF' > src/proof_target.ads
          package Proof_Target with SPARK_Mode is
             procedure Dummy_Proof (X : in out Integer) with
               Pre  => X < Integer'Last,
               Post => X > X'Old;
          end Proof_Target;
          EOF

          # Synthesize the corresponding package body to satisfy compiler code generation mandates
          cat << 'EOF' > src/proof_target.adb
          package body Proof_Target with SPARK_Mode is
             procedure Dummy_Proof (X : in out Integer) is
             begin
                X := X + 1;
             end Dummy_Proof;
          end Proof_Target;
          EOF

      - name: Build Alire Workspace
        run: |
          # Validate and compile the target workspace dependencies
          alr build --validation

      - name: Detect provers and generate Why3 config
        run: |
          # Force Why3 to scan the host system (/usr/bin/cvc5) and generate ~/.why3.conf
          alr exec -- why3config --detect-provers

      - name: Execute SPARK verification via CVC5
        run: |
          # Run the verification leveraging the newly discovered native CVC5 prover instance
          alr update
          alr gnatprove -P siunertaq.gpr \
            --why3-conf=$HOME/.why3.conf \
            --prover=cvc5 \
            --keep-failures

      - name: Aggregate SMT2 artifacts
        if: always()
        run: |
          # Establish the staging directory for extracted SMT-LIB v2 artifacts
          STAGING_DIR="${{ github.workspace }}/ci-out/smt2-artifacts/ada-cvc5"
          mkdir -p "$STAGING_DIR"

          if [ -d "obj/gnatprove" ]; then
            find obj/gnatprove -name "*.smt2" -exec cp {} "$STAGING_DIR/" \;
          fi

      - name: Persist verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smt2-verification-artifacts
          path: ci-out/smt2-artifacts/
          retention-days: 7