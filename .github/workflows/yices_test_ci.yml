name: Yices Threshold CI

on:
  workflow_dispatch:
  push:
    branches:
      - feature/ClickHouse_ruby
    paths:
      - build.sbt
      - modules/core/**
      - modules/z3-bridge/**
      - modules/dhall-bridge/**          # CondEvaluatorSpec がここに入る
      - modules/batch-bridge/**          # PerlBridge / RubyBridge ソース変更を捕捉
      - modules/yices-bridge/**
      - examples/**               # examples の変更もテストに影響する可能性があるため
      - modules/postgres-bridge/**  # postgres-bridge の変更もテストに影響する可能性があるため
      - .github/workflows/yices_test_ci.yml
  pull_request:
    paths:
      - build.sbt
      - modules/core/**
      - modules/z3-bridge/**
      - modules/dhall-bridge/**
      - modules/batch-bridge/**          # PerlBridge / RubyBridge ソース変更を捕捉
      - modules/yices-bridge/**
      - examples/**                      # examples の変更もテストに影響する可能性があるため
      - modules/postgres-bridge/**       # postgres-bridge の変更もテストに影響する可能性があるため
      - .github/workflows/yices_test_ci.yml

permissions:
  contents: read
concurrency:
  group: yices-threshold-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yices-threshold-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUN_YICES_SMOKE: "1"
      YICES_ARTIFACT_DIR: modules/yices-bridge/target/yices-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt
      - name: set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install Yices 2
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sri-csl/formal-methods
          sudo apt-get update
          sudo apt-get install -y yices2

      - name: Show Yices version
        shell: bash
        run: |
          set -euxo pipefail
          yices-smt2 --version

      # CondEvaluator は純粋関数なので Yices 不要・先に単独で実行
      - name: Run CondEvaluator unit tests (pure; no Yices required)
        shell: bash
        run: |
          set -euxo pipefail
          sbt "dhallBridge/testOnly io.siunertaq.batch.CondEvaluatorSpec"

      - name: Run threshold and Yices tests
        shell: bash
        run: |
          set -euxo pipefail
          sbt \
            "core/testOnly io.siunertaq.threshold.*" \
            "z3Bridge/compile"                       \
            "yicesBridge/compile"                    \
            "batchBridge/compile"                    \
            "postgresBridge/compile"                 \
            "petersenMzv/compile"                    \
            "yicesBridge/testOnly io.siunertaq.yicesbridge.*"

      # ─── 共通ライブラリ成果物 ──────────────────────────────────────────────
      # compile 済みクラスから JAR を生成する。incremental なので追加コストは小さい。
      # 対象: core (Program / Instr / Value の IR 定義)
      #        batch-bridge (PerlBridge / StackMachineTasklet / ScriptBackend)
      #        postgres-bridge (ClickHouse スキーマ + CDC パイプライン)
      - name: Package common library JARs
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          sbt \
            "core/package"             \
            "batchBridge/package"      \
            "postgresBridge/package"

      - name: Collect common library artifacts
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci-out/jars ci-out/schema

          # JAR — core / batch-bridge / postgres-bridge
          for mod in \
              "modules/core" \
              "modules/batch-bridge" \
              "modules/postgres-bridge"; do
            find "$mod/target" -maxdepth 3 -name "*.jar" \
              ! -name "*-sources.jar"                     \
              ! -name "*-javadoc.jar"                     \
              -exec cp {} ci-out/jars/ \;
          done

          # ClickHouse schema SQL (postgres-bridge/src/main/resources/ 以下)
          find . -path "*/resources/clickhouse_schema.sql" \
            -exec cp {} ci-out/schema/ \;

          echo "=== ci-out layout ==="
          find ci-out -type f | sort

      - name: Upload common library
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: siunertaq-common-library-${{ github.sha }}
          path: ci-out/
          if-no-files-found: warn

      - name: Upload Yices artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: yices-threshold-artifacts
          path: modules/yices-bridge/target/yices-artifacts
          if-no-files-found: ignore