name: Yices Threshold CI

on:
  workflow_dispatch:
  push:
    paths:
      - build.sbt
      - modules/core/**
      - modules/z3-bridge/**
      - modules/yices-bridge/**
      - .github/workflows/yices_test_ci.yml
  pull_request:
    paths:
      - build.sbt
      - modules/core/**
      - modules/z3-bridge/**
      - modules/yices-bridge/**
      - .github/workflows/yices_test_ci.yml

permissions:
  contents: read

concurrency:
  group: yices-threshold-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yices-threshold-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUN_YICES_SMOKE: "1"
      YICES_ARTIFACT_DIR: modules/yices-bridge/target/yices-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Install Yices 2
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sri-csl/formal-methods
          sudo apt-get update
          sudo apt-get install -y yices2

      - name: Show Yices version
        shell: bash
        run: |
          set -euxo pipefail
          yices-smt2 --version

      - name: Run threshold and Yices tests
        shell: bash
        run: |
          set -euxo pipefail
          sbt "core/testOnly io.siunertaq.threshold.*" "z3Bridge/compile" "yicesBridge/test"

      - name: Upload Yices artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: yices-threshold-artifacts
          path: modules/yices-bridge/target/yices-artifacts
          if-no-files-found: ignore