name: Verify SMT-LIB v2 DAG Preservation

on:
  push:
    branches: [ "example/Oka-Grauert"]
  pull_request:
    branches: [ "example/Oka-Grauert" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cvc5
        run: |
          sudo apt-get update
          sudo apt-get install -y cvc5

      - name: Run SMT Verification
        run: |
          echo "=== Verifying Stack Machine (c2 U c2 Trap) ==="
          cvc5 stack_machine.smt2
          
          echo "=== Verifying Register Machine (DAG Preservation via UF) ==="
          cvc5 register_machine.smt2