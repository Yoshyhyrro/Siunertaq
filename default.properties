# -----------------------------------------------------------------------
# Giter8 template variables for siunertaq
# "That which is ahead" — Kalarit: purpose / forward-facing direction
# Usage: sbt new <your-org>/siunertaq.g8
# -----------------------------------------------------------------------

name         = siunertaq
organization = io.siunertaq
package      = io.siunertaq.build

scala_version     = 3.8.3
sbt_version       = 1.11.2

# Apache Pekko (Akka 2.6.x fork, Apache 2.0)
# Official successor avoiding Akka's BSL issues. Native Scala 3 support.
pekko_version         = 1.4.0

cats_effect_version   = 3.5.7
fs2_version           = 3.11.0
circe_version         = 0.14.10
z3_version            = 4.8.14-v5
scalatest_version     = 3.2.19
logback_version       = 1.5.18

# CVE-2025-12183 mitigation: community fork of lz4-java
# org.lz4:lz4-java is end-of-life. Pekko 1.4.0 already uses the community fork.
lz4_version           = 1.8.1

# Native library paths (override via Z3_LIB_PATH / MLIR_LIB_PATH environment variables)
z3_lib_path   = /usr/lib/x86_64-linux-gnu
mlir_lib_path = /usr/lib/llvm-18/lib
